# Default values for llamacpp-inference chart

replicaCount: 1

# llama.cpp backend image selection
# GPUStack provides 5 separate builds: CUDA, ROCm, Vulkan, MUSA, CPU
# Choose the appropriate image for your hardware:
#
# Image variants available:
#   ghcr.io/ggerganov/llama.cpp:server-cuda   - NVIDIA CUDA (GPU)
#   ghcr.io/ggerganov/llama.cpp:server-rocm   - AMD ROCm (GPU)
#   ghcr.io/ggerganov/llama.cpp:server        - Vulkan (cross-vendor GPU)
#   ghcr.io/ggerganov/llama.cpp:server-musa   - Moore Threads MUSA (GPU)
#   ghcr.io/ggerganov/llama.cpp:server-cpu    - CPU only
image:
  # Auto-selects based on gpuType below. Supported values:
  # nvidia  → ghcr.io/ggerganov/llama.cpp:server-cuda
  # amd     → ghcr.io/ggerganov/llama.cpp:server-rocm
  # vulkan  → ghcr.io/ggerganov/llama.cpp:server
  # musa    → ghcr.io/ggerganov/llama.cpp:server-musa
  # none    → ghcr.io/ggerganov/llama.cpp:server-cpu
  autoBackend: true
  repository: ghcr.io/ggerganov/llama.cpp
  pullPolicy: IfNotPresent
  tag: "server-cuda"  # autoBackend=true overrides this

# GPU hardware type - determines which backend image is used
# nvidia  → CUDA build (NVIDIA GPU)
# amd     → ROCm build (AMD GPU)
# vulkan  → Vulkan build (NVIDIA/AMD/Intel cross-vendor GPU)
# musa    → MUSA build (Moore Threads GPU)
# intel   → Vulkan build (Intel GPU via Vulkan)
# none    → CPU build (no GPU, pure CPU inference)
gpuType: nvidia

# Model configuration
model:
  # HuggingFace model ID or local path (GGUF format required)
  # Recommended: TheBloke/*-GGUF, or your fine-tuned GGUF
  name: "TheBloke/Qwen2.5-7B-Instruct-GGUF"
  # GGUF model file name within the repo (leave empty for default)
  ggufFile: ""
  # Download on startup (requires internet)
  downloadOnStartup: true
  # HuggingFace token for gated models
  hfToken: ""

# Engine configuration (llama.cpp server flags)
engine:
  # Port for OpenAI-compatible API
  port: 8000
  # Context window size (number of tokens)
  contextSize: 8192
  # Maximum number of tokens to generate
  maxTokens: 2048
  # GPU layers to offload (-1 = all, 0 = CPU only)
  gpuLayers: -1
  # Tensor parallelism (for multi-GPU GGUF)
  tensorParallelSize: 1
  # GPU memory fraction per GPU (0.0-1.0)
  gpuMemoryUtilization: 0.90
  # Number of parallel sequences to generate
  parallel: 4
  # Batch size for prompt processing
  batchSize: 512
  # Threads for CPU computation (0 = auto)
  threads: 0
  # Extra server arguments
  extraArgs: ""

# Multi-node / distributed inference
distributed:
  enabled: false
  initImage: "nccl:latest"
  nodeList: []
  masterAddr: ""
  masterPort: 29500

# Scheduler type
scheduler:
  type: native
  name: ""
  annotations: {}
  volcano:
    queueName: ""
    groupMinMember: 0
    createPodGroup: false
    minResources: {}
  hami:
    nodeSchedulerPolicy: ""
    gpuSchedulerPolicy: ""
    deviceMemoryFraction: ""

# GPU hardware-specific resource overrides
# CPU mode (gpuType=none): no GPU, pure CPU
resources:
  # NVIDIA/AMD GPU mode
  nvidia:
    limits:
      nvidia.com/gpu: "1"
      memory: "16Gi"
      cpu: "4"
    requests:
      cpu: "2"
      memory: "8Gi"
  # AMD ROCm mode
  amd:
    limits:
      amd.com/gpu: "1"
      memory: "16Gi"
      cpu: "4"
    requests:
      cpu: "2"
      memory: "8Gi"
  # Vulkan / Intel / MUSA mode
  vulkan:
    limits:
      memory: "12Gi"
      cpu: "4"
    requests:
      cpu: "2"
      memory: "4Gi"
  # CPU-only mode
  none:
    limits:
      cpu: "8"
      memory: "32Gi"
    requests:
      cpu: "4"
      memory: "16Gi"
  # Active limits (derived from gpuType above)
  limits:
    memory: "16Gi"
    cpu: "4"
  requests:
    cpu: "2"
    memory: "8Gi"

# Node selector
nodeSelector: {}
tolerations: []
affinity: {}

# Prometheus metrics
metrics:
  enabled: true
  path: /metrics
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}
    annotations: {}

# Service configuration
service:
  type: ClusterIP
  port: 8000
  annotations: {}

# Ingress
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: llamacpp.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Health checks
livenessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 15
  periodSeconds: 10
readinessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 5
  periodSeconds: 5

# Autoscaling
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# /dev/shm for NCCL
shm:
  enabled: false
  sizeLimit: 1Gi

# Persistence (for model cache)
persistence:
  enabled: false
  storageClass: ""
  size: 50Gi
  mountPath: /root/.cache/huggingface

# Pod disruption budget
podDisruptionBudget:
  enabled: false
  minAvailable: ""
  maxUnavailable: 1

# Pod annotations
podAnnotations: {}
podLabels: {}

# Runtime / priority
runtimeClassName: ""
priorityClassName: ""
terminationGracePeriodSeconds: 60
topologySpreadConstraints: []

# Security context
securityContext:
  runAsUser: 0
  runAsGroup: 0
  fsGroup: 0

# Init / sidecar containers
initContainers: []
sidecars: []

# Service account
serviceAccount:
  create: false
  name: ""
  annotations: {}

# Volumes
volumes: []
volumeMounts: []
