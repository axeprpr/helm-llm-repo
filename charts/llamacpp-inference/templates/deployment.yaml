apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "llamacpp-inference.fullname" . }}
  labels:
    {{- include "llamacpp-inference.labels" . | nindent 4 }}
  {{- if and (eq .Values.scheduler.type "volcano") (hasKey .Values.scheduler "volcano") (gt (int .Values.scheduler.volcano.groupMinMember) 0) }}
  annotations:
    scheduling.volcano.sh/group-min-member: {{ .Values.scheduler.volcano.groupMinMember | quote }}
  {{- end }}
{{- with .Values.podLabels }}
    {{- toYaml . | nindent 4 }}
{{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "llamacpp-inference.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- if or .Values.podAnnotations (or .Values.scheduler.annotations .Values.annotations) }}
      annotations:
        {{- with .Values.scheduler.annotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.annotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      labels:
        {{- include "llamacpp-inference.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- $schedulerName := include "llamacpp-inference.schedulerName" . }}
      {{- if $schedulerName }}
      schedulerName: {{ $schedulerName }}
      {{- end }}
      serviceAccountName: {{ .Values.serviceAccount.name | default (include "llamacpp-inference.fullname" .) }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      {{- if .Values.initContainers }}
      initContainers:
        {{- range $c := .Values.initContainers }}
        - name: {{ $c.name }}
          image: {{ $c.image }}
          {{- if $c.command }}command: {{ $c.command }}{{- end }}
          {{- if $c.args }}args: {{ $c.args }}{{- end }}
          {{- if $c.volumeMounts }}volumeMounts: {{- toYaml $c.volumeMounts | nindent 10 }}{{- end }}
          {{- if $c.resources }}resources: {{- toYaml $c.resources | nindent 10 }}{{- end }}
        {{- end }}
      {{- end }}
      containers:
      - name: llamacpp
        {{- /* Auto-select backend image based on gpuType */}}
        image: {{ include "llamacpp-inference.backendImage" . }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command:
          - /bin/bash
          - -c
          - |
            server {{ include "llamacpp-inference.engineArgs" . | indent 12 }}
        ports:
        - name: http
          containerPort: {{ .Values.engine.port }}
          protocol: TCP
        env:
        - name: HF_HOME
          value: "/model"
        {{- if .Values.model.hfToken }}
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ include "llamacpp-inference.fullname" . }}-hf-token
              key: token
              optional: true
        {{- end }}
        livenessProbe:
          {{- toYaml .Values.livenessProbe | nindent 10 }}
        readinessProbe:
          {{- toYaml .Values.readinessProbe | nindent 10 }}
        {{- $rt := dict 
          "nvidia" .Values.resources.nvidia
          "amd" .Values.resources.amd
          "vulkan" .Values.resources.vulkan
          "none" .Values.resources.none
        }}
        {{- $selected := index $rt .Values.gpuType | default .Values.resources.nvidia }}
        resources:
          {{- toYaml $selected | nindent 10 }}
        volumeMounts:
        {{- if .Values.persistence.enabled }}
        - name: model-cache
          mountPath: /root/.cache/huggingface
        {{- end }}
        {{- if .Values.shm.enabled }}
        - name: dshm
          mountPath: /dev/shm
        {{- end }}
        {{- if .Values.volumeMounts }}
        {{- toYaml .Values.volumeMounts | nindent 8 }}
        {{- end }}
      {{- if .Values.sidecars }}
      {{- range $c := .Values.sidecars }}
      - name: {{ $c.name }}
        image: {{ $c.image }}
        {{- if $c.command }}command: {{ $c.command }}{{- end }}
        {{- if $c.args }}args: {{ $c.args }}{{- end }}
        {{- if $c.env }}env: {{- toYaml $c.env | nindent 10 }}{{- end }}
        {{- if $c.volumeMounts }}volumeMounts: {{- toYaml $c.volumeMounts | nindent 10 }}{{- end }}
        {{- if $c.resources }}resources: {{- toYaml $c.resources | nindent 10 }}{{- end }}
      {{- end }}
      {{- end }}
      volumes:
      {{- if .Values.persistence.enabled }}
      - name: model-cache
        persistentVolumeClaim:
          claimName: {{ include "llamacpp-inference.fullname" . }}-model-cache
      {{- end }}
      {{- if .Values.shm.enabled }}
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: {{ .Values.shm.sizeLimit | default "1Gi" }}
      {{- end }}
      {{- if .Values.volumes }}
      {{- toYaml .Values.volumes | nindent 6 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $tolerations := include "llamacpp-inference.gpuTolerations" . | fromYamlArray | default list }}
      {{- $tolerations = concat $tolerations (.Values.tolerations | default list) | uniq }}
      {{- if $tolerations }}
      tolerations:
        {{- toYaml $tolerations | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
{{- if .Values.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "llamacpp-inference.fullname" . }}
  labels:
    {{- include "llamacpp-inference.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "llamacpp-inference.fullname" . }}
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
  {{- if .Values.autoscaling.targetCPUUtilizationPercentage }}
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
  {{- end }}
  {{- if .Values.autoscaling.targetMemoryUtilizationPercentage }}
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: {{ .Values.autoscaling.targetMemoryUtilizationPercentage }}
  {{- end }}
{{- end }}
---
{{- if .Values.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "llamacpp-inference.fullname" . }}
  labels:
    {{- include "llamacpp-inference.labels" . | nindent 4 }}
spec:
  {{- if .Values.podDisruptionBudget.minAvailable }}
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  {{- else }}
  maxUnavailable: {{ .Values.podDisruptionBudget.maxUnavailable | default 1 }}
  {{- end }}
{{- end }}
