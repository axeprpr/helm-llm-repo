apiVersion: batch.volcano.sh/v1alpha1
kind: Job
metadata:
  name: vcjob-restartjob
  namespace: volcano-single
spec:
  minAvailable: 1
  schedulerName: volcano
  queue: default
  maxRetry: 1
  policies:
    - event: PodFailed
      action: RestartJob
  tasks:
    - replicas: 1
      name: runner
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: failer
              image: docker.io/calico/node:v3.25.0
              command: ["sh", "-c", "echo restart-me && exit 1"]
              resources:
                requests:
                  cpu: "1"
                  memory: "64Mi"
                limits:
                  cpu: "1"
                  memory: "64Mi"
