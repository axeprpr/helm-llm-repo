apiVersion: apps/v1
kind: Deployment
metadata:
  name: preempt-high
  namespace: volcano-single
spec:
  replicas: 2
  selector:
    matchLabels:
      app: preempt-high
  template:
    metadata:
      labels:
        app: preempt-high
    spec:
      schedulerName: volcano
      priorityClassName: volcano-high
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.8
          resources:
            requests:
              cpu: "4"
              memory: "64Mi"
            limits:
              cpu: "4"
              memory: "64Mi"
