apiVersion: batch.volcano.sh/v1alpha1
kind: Job
metadata:
  name: vcjob-taskcompleted
  namespace: volcano-single
spec:
  minAvailable: 3
  schedulerName: volcano
  queue: default
  maxRetry: 1
  tasks:
    - replicas: 1
      name: ps
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: sleeper
              image: docker.io/calico/node:v3.25.0
              command: ["sh", "-c", "echo ps-start && sleep 600"]
              resources:
                requests:
                  cpu: "1"
                  memory: "64Mi"
                limits:
                  cpu: "1"
                  memory: "64Mi"
    - replicas: 2
      name: worker
      policies:
        - event: TaskCompleted
          action: CompleteJob
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: worker
              image: docker.io/calico/node:v3.25.0
              command: ["sh", "-c", "echo worker-ok && sleep 5"]
              resources:
                requests:
                  cpu: "1"
                  memory: "64Mi"
                limits:
                  cpu: "1"
                  memory: "64Mi"
