runtimeClassName: nvidia
gpuType: nvidia

model:
  name: /models
  ggufFile: qwen2.5-0.5b-instruct-q4_k_m.gguf
  downloadOnStartup: false

engine:
  contextSize: 4096
  gpuLayers: -1
  parallel: 2
  batchSize: 256

volumes:
  - name: model-cache
    emptyDir: {}

volumeMounts:
  - name: model-cache
    mountPath: /models

initContainers:
  - name: fetch-model
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    command:
      - /bin/bash
      - -lc
    args:
      - >-
        set -euo pipefail;
        mkdir -p /models;
        curl -L --fail --retry 5
        -o /models/qwen2.5-0.5b-instruct-q4_k_m.gguf
        https://huggingface.co/Qwen/Qwen2.5-0.5B-Instruct-GGUF/resolve/main/qwen2.5-0.5b-instruct-q4_k_m.gguf
    env:
      - name: http_proxy
        value: http://192.168.3.42:7890
      - name: https_proxy
        value: http://192.168.3.42:7890
      - name: HTTP_PROXY
        value: http://192.168.3.42:7890
      - name: HTTPS_PROXY
        value: http://192.168.3.42:7890
    volumeMounts:
      - name: model-cache
        mountPath: /models
    resources:
      requests:
        cpu: "1"
        memory: "1Gi"
      limits:
        cpu: "2"
        memory: "2Gi"

extraEnv:
  - name: http_proxy
    value: http://192.168.3.42:7890
  - name: https_proxy
    value: http://192.168.3.42:7890
  - name: HTTP_PROXY
    value: http://192.168.3.42:7890
  - name: HTTPS_PROXY
    value: http://192.168.3.42:7890
