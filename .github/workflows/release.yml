name: Release Helm Charts

on:
  push:
    branches: [main]
    paths:
      - 'charts/**'
      - '.github/workflows/**'
      - 'scripts/**'
      - 'Makefile'
  pull_request:
    paths:
      - 'charts/**'
      - '.github/workflows/**'
      - 'scripts/**'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  lint-and-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.14.0'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install chart-testing
        run: pip install chart-testing

      - name: Run chart-testing (lint)
        run: ct lint --all --validate-maintainers=false || true

      - name: Package charts
        run: |
          mkdir -p packages
          for chart in charts/*/; do
            helm package "${chart}" --destination packages/
          done
          ls packages/

      - name: Generate index
        run: |
          helm repo index packages --url https://axeprpr.github.io/helm-llm-repo
          cat packages/index.yaml

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: helm-charts
          path: packages/
          retention-days: 30

      - name: Validate index
        run: python3 scripts/validate-index.py

  publish-pages:
    needs: lint-and-package
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'release'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: helm-charts
          path: .

      - name: Setup Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Commit and push
        run: |
          cp packages/*.tgz ./
          helm repo index . --url https://axeprpr.github.io/helm-llm-repo
          git add *.tgz index.yaml
          git commit -m "Release charts $(date +%Y-%m-%d)"
          git push -f origin gh-pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
