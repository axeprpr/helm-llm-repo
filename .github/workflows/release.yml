name: Release Helm Charts

on:
  push:
    branches: [main]
    paths:
      - 'charts/**'
      - '.github/workflows/**'
      - 'scripts/**'
      - 'Makefile'
  pull_request:
    paths:
      - 'charts/**'
      - '.github/workflows/**'
      - 'scripts/**'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout gh-pages
        run: |
          git clone --branch gh-pages --depth 1 https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git _site 2>/dev/null || true
          mkdir -p _site

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.14.0'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyYAML
        run: pip install --break-system-packages pyyaml

      - name: Helm lint
        run: |
          for chart in charts/*/; do
            helm lint "${chart}" || true
          done

      - name: Package charts
        run: |
          mkdir -p _site
          for chart in charts/*/; do
            helm package "${chart}" --destination _site/
          done
          ls _site/

      - name: Generate index
        run: |
          python3 scripts/validate-index.py
          helm repo index _site --url https://axeprpr.github.io/helm-llm-repo --merge _site/index.yaml 2>/dev/null || \
            helm repo index _site --url https://axeprpr.github.io/helm-llm-repo
          echo "--- INDEX ---"
          cat _site/index.yaml

      - name: Deploy to GitHub Pages
        run: |
          cd _site
          git init
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add *.tgz index.yaml
          git commit -m "Release charts $(date +%Y-%m-%d)"
          git push -f https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:gh-pages

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
