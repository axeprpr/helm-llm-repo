name: Release Helm Charts

on:
  push:
    branches:
      - main
    paths:
      - "charts/**"
      - ".github/workflows/release.yml"
      - "Makefile"
  workflow_dispatch:

concurrency:
  group: release-helm-charts
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    if: github.ref_name == 'main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.14.0"

      - name: Lint charts
        shell: bash
        run: |
          set -euo pipefail

          shopt -s nullglob
          charts=(charts/*)

          if [ ${#charts[@]} -eq 0 ]; then
            echo "No charts found under charts/"
            exit 1
          fi

          for chart in "${charts[@]}"; do
            if [ -d "$chart" ]; then
              echo "Linting $chart"
              helm lint "$chart"
            fi
          done

      - name: Build Helm repo in gh-pages worktree
        env:
          GH_PAGES_PAT: ${{ secrets.GH_PAGES_PAT }}
          REPO: ${{ github.repository }}
          REPO_OWNER: ${{ github.repository_owner }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${GH_PAGES_PAT}" ]; then
            echo "Missing GH_PAGES_PAT secret"
            exit 1
          fi

          rm -rf .gh-pages

          remote_url="https://x-access-token:${GH_PAGES_PAT}@github.com/${REPO}.git"

          if git clone --branch gh-pages --single-branch "$remote_url" .gh-pages; then
            echo "Cloned existing gh-pages branch"
          else
            echo "gh-pages branch does not exist yet; creating it"
            mkdir .gh-pages
            cd .gh-pages
            git init
            git checkout -b gh-pages
            git remote add origin "$remote_url"
            cd ..
          fi

          find .gh-pages -maxdepth 1 -type f \( -name "*.tgz" -o -name "index.yaml" \) -delete

          shopt -s nullglob
          for chart in charts/*; do
            if [ -d "$chart" ]; then
              echo "Packaging $chart"
              helm package "$chart" --destination .gh-pages
            fi
          done

          helm repo index .gh-pages --url "https://${REPO_OWNER}.github.io/$(basename "${REPO}")"

      - name: Commit and push to gh-pages
        env:
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          cd .gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes to publish"
            exit 0
          fi

          git commit -m "Release charts from ${GITHUB_SHA}"
          git push origin gh-pages
