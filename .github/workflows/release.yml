name: Release Helm Charts

on:
  push:
    branches: [main]
    paths:
      - 'charts/**'
      - '.github/workflows/**'
      - 'scripts/**'
      - 'Makefile'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare gh-pages dir
        run: |
          rm -rf _site
          git clone --branch gh-pages --depth 1 https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git _site 2>/dev/null || mkdir _site

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.14.0'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyYAML
        run: pip install --break-system-packages pyyaml

      - name: Helm lint
        run: |
          for chart in charts/*/; do
            helm lint "${chart}" || true
          done

      - name: Package charts
        run: |
          for chart in charts/*/; do
            helm package "${chart}" --destination _site/
          done
          ls _site/

      - name: Generate index
        run: |
          python3 scripts/validate-index.py
          helm repo index _site --url https://axeprpr.github.io/helm-llm-repo --merge _site/index.yaml 2>/dev/null || \
            helm repo index _site --url https://axeprpr.github.io/helm-llm-repo
          echo "=== INDEX ==="
          cat _site/index.yaml

      - name: Push to gh-pages
        run: |
          cd _site
          git init
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Release charts $(date +'%Y-%m-%d %H:%M:%S')" || true
          git push -f https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:gh-pages

      - name: Trigger pages rebuild
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createPagesSite({
              owner: context.repo.owner,
              repo: context.repo.repo,
              build_type: 'workflow'
            });
