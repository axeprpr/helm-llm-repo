name: Release Helm Charts

on:
  push:
    branches: [main]
    paths:
      - 'charts/**'
      - 'Makefile'
  pull_request:
    paths:
      - 'charts/**'
  release:
    types: [published]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  lint-and-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.14.0'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install chart-testing
        run: |
          pip install chart-testing pytest pytest-xdist

      - name: Run chart-testing (lint)
        run: ct lint --all --validate-maintainers=false || true

      - name: Package charts
        run: |
          mkdir -p packages
          for chart in charts/*/; do
            helm package "$$chart" --destination packages/
          done
          ls packages/

      - name: Generate/update index
        run: |
          helm repo add stable https://charts.helm.sh/stable 2>/dev/null || true
          helm repo update 2>/dev/null || true
          helm repo index packages --url https://axeprpr.github.io/helm-llm-repo --merge packages/index.yaml 2>/dev/null || \
            helm repo index packages --url https://axeprpr.github.io/helm-llm-repo
          cat packages/index.yaml

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: helm-charts
          path: packages/
          retention-days: 30

      - name: Validate index
        run: |
          python3 -c "
import yaml
with open('packages/index.yaml') as f:
    idx = yaml.safe_load(f)
    charts = idx.get('entries', {})
    for name, versions in charts.items():
        print(f'{name}: {[v[\"version\"] for v in versions]}')
          "

  publish-pages:
    needs: lint-and-package
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'release'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: helm-charts
          path: .

      - name: Setup Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Commit and push
        run: |
          git checkout --orphan gh-pages
          cp packages/*.tgz ./
          helm repo index . --url https://axeprpr.github.io/helm-llm-repo
          git add *.tgz index.yaml
          git commit -m "Release: $(date +%Y-%m-%d)"
          git push -f origin gh-pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
